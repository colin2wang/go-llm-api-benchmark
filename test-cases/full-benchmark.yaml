# full-benchmark.yaml -- Full benchmark set
# Covers short, medium and long prompts across the full concurrency gradient.
test_cases:
  - name: "Short text - full gradient"
    prompt: "What are the specs of the iPhone 13 Pro Max?"
    max_tokens: 256
    num_words: 0
    concurrency: [1, 2, 4, 8]

  - name: "Quantum computing overview"
    prompt: "Please provide a comprehensive overview of quantum computing, including its fundamental principles, current state of development, major challenges, and potential applications across different industries such as healthcare, finance, and cryptography."
    max_tokens: 512
    num_words: 0
    concurrency: [1, 2, 4, 8]

  - name: "History of AI"
    prompt: "Write a detailed essay on the history and evolution of artificial intelligence, covering its origins in the 1950s, the AI winters and springs, the rise of machine learning, deep learning breakthroughs, the emergence of large language models, and the future implications for society and humanity."
    max_tokens: 1024
    num_words: 0
    concurrency: [1, 2, 4, 8]
